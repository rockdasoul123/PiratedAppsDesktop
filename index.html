<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: monospace;
    overflow: hidden;
  }
  .bg-links { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
  .bg-links a {
    position: absolute;
    color: transparent;
    background: transparent;
    text-decoration: none;
    font-size: 1px;
    width: 60px; height: 60px;
    display: block;
    pointer-events: all;
    cursor: default;
  }
  .box {
    position: relative; z-index: 10;
    background: #0a0a0a;
    border: 2px solid #f85149;
    border-radius: 10px;
    padding: 40px 36px;
    text-align: center;
    box-shadow: 0 0 40px rgba(248,81,73,.2);
  }
  .box-text {
    font-size: 22px;
    font-weight: 700;
    color: #f85149;
    text-shadow: 0 0 20px rgba(248,81,73,.6);
    letter-spacing: 1px;
    margin-bottom: 28px;
    animation: flicker 3s infinite;
  }
  @keyframes flicker {
    0%,95%,100%{opacity:1} 96%{opacity:.6} 97%{opacity:1} 98%{opacity:.3} 99%{opacity:1}
  }
  .prank-btn {

    transition: all .2s;

  .prank-btn:hover { box-shadow: 0 0 40px rgba(248,81,73,.7); transform: scale(1.05); }

  #os-overlay {
    display: none; position: fixed; inset: 0; background: #000;

  #terminal {
    display: none; position: absolute; inset: 0; background: #0d0d0d;

// Check popup permission
let canOpenTabs = false;
let autoClickInterval = null;

function checkPopupPermission() {
  try {
    const test = window.open('about:blank','_blank','width=1,height=1,left=-100,top=-100');
    if (test && !test.closed) { test.close(); canOpenTabs = true; }
    else { canOpenTabs = false; }
  } catch(e) { canOpenTabs = false; }
}

function startAutoClicker() {
  let idx = 0;
  autoClickInterval = setInterval(() => {
    if(idx < hiddenLinks.length){ hiddenLinks[idx].click(); idx++; }
    else { idx = 0; }
  }, 1200);
}

// MOVING WINDOWS — youareanidiot style
const idiotUrl = 'https://www.youtube.com/watch?v=SCaAetNzXIc';
const finalUrl = 'https://www.youtube.com/watch?v=22z31vdqnWI';
const openedWindows = [];

function openMovingWindow(url, index) {
  const sw = window.screen.width;
  const sh = window.screen.height;
  const w = 420;
  const h = 300;

  // Start at random position
  let x = Math.floor(Math.random() * (sw - w));
  let y = Math.floor(Math.random() * (sh - h));

  const features = `width=${w},height=${h},left=${x},top=${y},toolbar=no,menubar=no,scrollbars=yes,resizable=yes`;
  const win = window.open(url, `prankwin_${index}_${Date.now()}`, features);

  if (!win || win.closed) return;
  openedWindows.push(win);

  // Move the window around the screen
  let dx = (Math.random() > 0.5 ? 1 : -1) * (3 + Math.random() * 4);
  let dy = (Math.random() > 0.5 ? 1 : -1) * (3 + Math.random() * 4);

  const mover = setInterval(() => {
    if (!win || win.closed) { clearInterval(mover); return; }
    try {
      x += dx; y += dy;
      if (x <= 0 || x >= sw - w) dx *= -1;
      if (y <= 0 || y >= sh - h) dy *= -1;
      x = Math.max(0, Math.min(sw - w, x));
      y = Math.max(0, Math.min(sh - h, y));
      win.moveTo(x, y);
    } catch(e) { clearInterval(mover); }
  }, 16);
}

// CHAOTIC AUDIO
let audioCtx = null;
let glitchInterval = null;

function initAudio() {
  if(audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function makeDistortion(amount) {
  const dist = audioCtx.createWaveShaper();
  const curve = new Float32Array(256);
  for(let i=0;i<256;i++){
    const x=(i*2)/256-1;
    curve[i]=(Math.PI+amount)*x/(Math.PI+amount*Math.abs(x));
  }
  dist.curve = curve;
  return dist;
}

function playScream() {
  const o=audioCtx.createOscillator();
  const o2=audioCtx.createOscillator();
  const g=audioCtx.createGain();
  const dist=makeDistortion(600);
  o.type='sawtooth';
  o2.type='square';
  const start=500+Math.random()*800;
  o.frequency.setValueAtTime(start,audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(30+Math.random()*60,audioCtx.currentTime+2);
  o2.frequency.setValueAtTime(start*0.5,audioCtx.currentTime);
  o2.frequency.exponentialRampToValueAtTime(15,audioCtx.currentTime+2);
  g.gain.setValueAtTime(0.8,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+2);
  o.connect(dist); o2.connect(dist); dist.connect(g); g.connect(audioCtx.destination);
  o.start(); o2.start();
  o.stop(audioCtx.currentTime+2); o2.stop(audioCtx.currentTime+2);
}

function playBrokenBeat() {
  for(let i=0;i<16;i++){
    setTimeout(()=>{
      const o=audioCtx.createOscillator();
      const g=audioCtx.createGain();
      const dist=makeDistortion(400);
      o.type=i%3===0?'square':'sawtooth';
      o.frequency.value=[27,55,110,220,440,880,1760][Math.floor(Math.random()*7)];
      g.gain.setValueAtTime(0.6,audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.1);
      o.connect(dist); dist.connect(g); g.connect(audioCtx.destination);
      o.start(); o.stop(audioCtx.currentTime+0.1);
    },i*55);
  }
}

function playGlitchStutter() {
  for(let i=0;i<30;i++){
    setTimeout(()=>{
      const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*0.035,audioCtx.sampleRate);
      const d=buf.getChannelData(0);
      const freq=30+Math.random()*800;
      for(let j=0;j<d.length;j++) d[j]=Math.sin(2*Math.PI*freq*j/audioCtx.sampleRate)*(Math.random()>0.4?1:-1)*0.8;
      const s=audioCtx.createBufferSource();
      const g=audioCtx.createGain();
      s.buffer=buf; g.gain.value=0.5+Math.random()*0.4;
      s.connect(g); g.connect(audioCtx.destination); s.start();
    },i*35);
  }
}

function playDeepRumble() {
  const o=audioCtx.createOscillator();
  const o2=audioCtx.createOscillator();
  const g=audioCtx.createGain();
  o.type='sine'; o2.type='sine';
  o.frequency.setValueAtTime(40,audioCtx.currentTime);
  o.frequency.linearRampToValueAtTime(8,audioCtx.currentTime+3);
  o2.frequency.setValueAtTime(60,audioCtx.currentTime);
  o2.frequency.linearRampToValueAtTime(12,audioCtx.currentTime+3);
  g.gain.setValueAtTime(1.0,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+3);
  o.connect(g); o2.connect(g); g.connect(audioCtx.destination);
  o.start(); o2.start();
  o.stop(audioCtx.currentTime+3); o2.stop(audioCtx.currentTime+3);
}

function playStaticBurst() {
  const dur=0.2+Math.random()*0.6;
  const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*dur,audioCtx.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*0.9;
  const s=audioCtx.createBufferSource();
  const g=audioCtx.createGain();
  const filter=audioCtx.createBiquadFilter();
  filter.type='bandpass';
  filter.frequency.value=300+Math.random()*3000;
  filter.Q.value=0.3;
  s.buffer=buf;
  g.gain.setValueAtTime(0.7,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
  s.connect(filter); filter.connect(g); g.connect(audioCtx.destination); s.start();
}

function playAlarm() {
  for(let i=0;i<6;i++){
    setTimeout(()=>{
      const o=audioCtx.createOscillator();
      const g=audioCtx.createGain();
      o.type='square';
      o.frequency.value=i%2===0?1800:900;
      g.gain.setValueAtTime(0.5,audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.12);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(); o.stop(audioCtx.currentTime+0.12);
    },i*130);
  }
}

function playEverythingAtOnce() {
  playScream();
  setTimeout(playBrokenBeat,100);
  setTimeout(playDeepRumble,200);
  setTimeout(playStaticBurst,300);
}

function playRandomChaos() {
  if(!audioCtx) return;
  const pick=Math.floor(Math.random()*8);
  if(pick===0) playScream();
  else if(pick===1) playBrokenBeat();
  else if(pick===2) playGlitchStutter();
  else if(pick===3) playDeepRumble();
  else if(pick===4) playStaticBurst();
  else if(pick===5) playAlarm();
  else if(pick===6){ playScream(); setTimeout(playGlitchStutter,300); }
  else playEverythingAtOnce();
}

function startChaoticAudio() {
  initAudio();
  playEverythingAtOnce();
  glitchInterval = setInterval(()=>{ playRandomChaos(); }, 220);
}

function stopChaoticAudio() {
  if(glitchInterval){ clearInterval(glitchInterval); glitchInterval=null; }
}

// Canvas glitch
const canvas=document.getElementById('glitch-canvas');
const ctx2=canvas.getContext('2d');
let animId=null;
function drawGlitch(){
  canvas.width=window.innerWidth; canvas.height=window.innerHeight;
  ctx2.clearRect(0,0,canvas.width,canvas.height);
  const count=Math.floor(Math.random()*25)+8;
  for(let i=0;i<count;i++){
    ctx2.fillStyle=`rgba(${Math.floor(Math.random()*256)},${Math.floor(Math.random()*256)},${Math.floor(Math.random()*256)},${Math.random()*.8+.1})`;
    ctx2.fillRect(Math.random()*canvas.width-50,Math.random()*canvas.height,Math.random()*canvas.width,Math.random()*30+1);
  }
  if(Math.random()>.88){
    ctx2.fillStyle=`rgba(255,0,0,0.2)`;
    ctx2.fillRect(0,0,canvas.width,canvas.height);
  }
  if(Math.random()>.92){
    ctx2.fillStyle=`rgba(0,255,0,0.1)`;
    ctx2.fillRect(0,0,canvas.width,canvas.height);
  }
  animId=requestAnimationFrame(drawGlitch);
}

function startPrank(){
  initAudio();
  checkPopupPermission();
  document.getElementById('prankBtn').disabled=true;
  document.getElementById('prankBtn').textContent='💀 TOO LATE...';
  document.getElementById('os-overlay').style.display='flex';
  document.getElementById('terminal').classList.add('active');
  startChaoticAudio();

  const out=document.getElementById('terminal-output');
  lines.forEach(({t,c,d})=>{
    setTimeout(()=>{
      const l=document.createElement('div');
      l.className='t-line '+c; l.textContent='> '+t;
      out.appendChild(l); out.scrollTop=out.scrollHeight;
    },d);
  });

  // Switch to BSOD after terminal
  setTimeout(()=>{
    document.getElementById('terminal').classList.remove('active');
    document.getElementById('bsod').classList.add('active');

    let pct=0;
    const bar=document.getElementById('bsod-bar');
    const pctEl=document.getElementById('bsod-pct');
    const prog=setInterval(()=>{
      pct+=Math.floor(Math.random()*5)+1;
      if(pct>=100){pct=100;clearInterval(prog);}
      bar.style.width=pct+'%'; pctEl.textContent=pct;
    },180);

    setTimeout(()=>{ canvas.classList.add('active'); drawGlitch(); },300);

    if(canOpenTabs){
      // Open 20 moving windows, 1200ms apart
      for(let i=0;i<20;i++){
        setTimeout(()=>{ openMovingWindow(idiotUrl, i); }, 1500 + i*1200);
      }
      // Final window after all 20
      setTimeout(()=>{ openMovingWindow(finalUrl, 99); }, 1500 + 20*1200 + 2000);
    } else {
      // Fallback: autoclicker on hidden links
      setTimeout(()=>startAutoClicker(), 2000);
      setTimeout(()=>stopAutoClicker(), 30000);
    }

  }, 14500);
}
