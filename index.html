<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>secret stuff</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: monospace;
    overflow: hidden;
  }
  .bg-links { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
  .bg-links a {
    position: absolute;
    color: transparent;
    background: transparent;
    text-decoration: none;
    font-size: 1px;
    width: 60px; height: 60px;
    display: block;
    pointer-events: all;
    cursor: default;
  }
  .box {
    position: relative; z-index: 10;
    background: #0a0a0a;
    border: 2px solid #f85149;
    border-radius: 10px;
    padding: 40px 36px;
    text-align: center;
    box-shadow: 0 0 40px rgba(248,81,73,.2);
  }
  .box-text {
    font-size: 22px;
    font-weight: 700;
    color: #f85149;
    text-shadow: 0 0 20px rgba(248,81,73,.6);
    letter-spacing: 1px;
    margin-bottom: 28px;
    animation: flicker 3s infinite;
  }
  @keyframes flicker {
    0%,95%,100%{opacity:1} 96%{opacity:.6} 97%{opacity:1} 98%{opacity:.3} 99%{opacity:1}
  }
  .prank-btn {
    background: #1a0a0a;
    border: 2px solid #f85149;
    color: #f85149;
    font-family: monospace;
    font-size: 15px;
    font-weight: 700;
    padding: 14px 40px;
    border-radius: 8px;
    cursor: pointer;
    letter-spacing: 2px;
    text-transform: uppercase;
    box-shadow: 0 0 20px rgba(248,81,73,.3);
    transition: all .2s;
  }
  .prank-btn:hover { box-shadow: 0 0 40px rgba(248,81,73,.7); transform: scale(1.05); }

  /* FAKE OS */
  #os-overlay {
    display: none; position: fixed; inset: 0; background: #000;
    z-index: 9999; font-family: monospace; flex-direction: column;
  }
  #terminal {
    display: none; position: absolute; inset: 0; background: #0d0d0d;
    color: #00ff41; padding: 24px; z-index: 1; flex-direction: column;
    overflow: hidden; font-size: 13px; line-height: 1.6;
  }
  #terminal.active { display: flex; }
  #terminal-output { flex: 1; overflow: hidden; }
  .t-line { opacity: 0; animation: fadein .05s forwards; }
  @keyframes fadein { to { opacity: 1; } }
  .t-red { color: #f85149; }
  .t-yellow { color: #e3b341; }
  .t-cyan { color: #00ffff; }
  #bsod {
    display: none; position: absolute; inset: 0; background: #0000aa;
    color: #aaa; padding: 40px; z-index: 2; flex-direction: column; gap: 16px; font-size: 14px;
  }
  #bsod.active { display: flex; }
  #bsod .sad { font-size: 64px; margin-bottom: 8px; }
  #bsod h2 { font-size: 24px; color: #fff; margin-bottom: 16px; }
  #bsod p { max-width: 600px; line-height: 1.8; }
  #bsod .bar-wrap { width: 300px; height: 20px; background: #0000aa; border: 2px solid #fff; margin-top: 8px; }
  #bsod .bar-fill { height: 100%; background: #fff; width: 0%; }
  #glitch-canvas { display: none; position: absolute; inset: 0; z-index: 3; pointer-events: none; }
  #glitch-canvas.active { display: block; }
  #close-btn {
    display: none; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
    z-index: 99999; background: #1a1a1a; border: 2px solid #3fb950; color: #3fb950;
    font-family: monospace; font-size: 14px; padding: 12px 32px; border-radius: 8px;
    cursor: pointer; animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%,100%{box-shadow:0 0 20px rgba(63,185,80,.3)} 50%{box-shadow:0 0 40px rgba(63,185,80,.8)}
  }
  #close-btn.visible { display: block; }
</style>
</head>
<body>

<div class="bg-links" id="bgLinks"></div>

<div class="box">
  <div class="box-text">⚠ Click the button below to know secret stuff ⚠</div>
  <button class="prank-btn" id="prankBtn" onclick="startPrank()">🔴 CLICK HERE FOR SECRET STUFF 🔴</button>
</div>

<div id="os-overlay">
  <div id="terminal"><div id="terminal-output"></div></div>
  <div id="bsod">
    <div class="sad">:(</div>
    <h2>Your PC ran into a problem and needs to restart.</h2>
    <p>We're collecting some error info, then we'll restart for you.</p>
    <p style="margin-top:12px;">Error: <strong style="color:#fff;">SYSTEM_TOTALLY_FINE_TRUST_US_0x000PRANK</strong></p>
    <div style="color:#fff;margin-top:20px;">Collecting data: <span id="bsod-pct">0</span>%</div>
    <div class="bar-wrap"><div class="bar-fill" id="bsod-bar"></div></div>
  </div>
  <canvas id="glitch-canvas"></canvas>
</div>

<button id="close-btn" onclick="closePrank()">✅ lol jk — close prank</button>

<script>
(function(){
  const c=document.getElementById('bgLinks');
  for(let i=0;i<60;i++){
    const a=document.createElement('a');
    a.href='https://www.youtube.com/watch?v=SCaAetNzXIc';
    a.target='_blank'; a.rel='noopener noreferrer';
    a.style.left=Math.random()*100+'%';
    a.style.top=Math.random()*100+'%';
    a.textContent='.';
    c.appendChild(a);
  }
})();

let audioCtx=null,glitchInterval=null;
function initAudio(){ if(audioCtx)return; audioCtx=new(window.AudioContext||window.webkitAudioContext)(); }
function playGlitch(){
  if(!audioCtx)return;
  const t=Math.floor(Math.random()*4);
  if(t===0){
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type='sawtooth'; o.frequency.setValueAtTime(80+Math.random()*400,audioCtx.currentTime);
    o.frequency.exponentialRampToValueAtTime(20,audioCtx.currentTime+0.3);
    g.gain.setValueAtTime(0.4,audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.3);
    o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+0.3);
  } else if(t===1){
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type='square'; o.frequency.value=440+Math.random()*880;
    g.gain.setValueAtTime(0.3,audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.15);
    o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+0.15);
  } else if(t===2){
    const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*0.2,audioCtx.sampleRate);
    const d=buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*0.5;
    const s=audioCtx.createBufferSource(),g=audioCtx.createGain();
    s.buffer=buf; g.gain.setValueAtTime(0.4,audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.2);
    s.connect(g); g.connect(audioCtx.destination); s.start();
  } else {
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type='sawtooth'; o.frequency.setValueAtTime(1200,audioCtx.currentTime);
    o.frequency.exponentialRampToValueAtTime(30,audioCtx.currentTime+0.6);
    g.gain.setValueAtTime(0.5,audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.6);
    o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+0.6);
  }
}
function startGlitchAudio(){ initAudio(); playGlitch(); glitchInterval=setInterval(()=>{ if(Math.random()>.3)playGlitch(); },350); }
function stopGlitchAudio(){ if(glitchInterval){clearInterval(glitchInterval);glitchInterval=null;} }

const canvas=document.getElementById('glitch-canvas');
const ctx2=canvas.getContext('2d');
let animId=null;
function drawGlitch(){
  canvas.width=window.innerWidth; canvas.height=window.innerHeight;
  ctx2.clearRect(0,0,canvas.width,canvas.height);
  for(let i=0;i<Math.floor(Math.random()*12)+2;i++){
    ctx2.fillStyle=`rgba(${Math.floor(Math.random()*256)},${Math.floor(Math.random()*256)},${Math.floor(Math.random()*256)},${Math.random()*.5+.1})`;
    ctx2.fillRect(Math.random()*100-50,Math.random()*canvas.height,Math.random()*canvas.width*.8+canvas.width*.1,Math.random()*6+1);
  }
  animId=requestAnimationFrame(drawGlitch);
}

const lines=[
  {t:'SYSTEM BOOT SEQUENCE INITIATED...',c:'',d:0},
  {t:'Loading kernel modules...',c:'t-cyan',d:300},
  {t:'[  OK  ] Reached target Local File Systems.',c:'t-cyan',d:600},
  {t:'Scanning for viruses...',c:'',d:900},
  {t:'>>> DETECTED: 1,337 CRITICAL THREATS',c:'t-red',d:1300},
  {t:'>>> ERROR: FIREWALL COMPROMISED',c:'t-red',d:1600},
  {t:'Attempting recovery...........',c:'t-yellow',d:1900},
  {t:'[FAIL] Recovery process terminated.',c:'t-red',d:2500},
  {t:'Uploading your files to the cloud ☁️',c:'t-yellow',d:2800},
  {t:'sending_data_to_hacker_server.exe... ████████░░ 80%',c:'t-red',d:3100},
  {t:'>>> PASSWORD HASH CAPTURED',c:'t-red',d:3600},
  {t:'>>> MINECRAFT ACCOUNT STOLEN 😂',c:'t-red',d:4000},
  {t:'KERNEL PANIC — not syncing: VFS unable to mount root fs',c:'t-red',d:4800},
  {t:'CPU[0]: PRANK_OVERFLOW at 0xDEADBEEF',c:'t-red',d:5200},
];

function startPrank(){
  initAudio();
  document.getElementById('prankBtn').disabled=true;
  document.getElementById('prankBtn').textContent='💀 TOO LATE...';
  document.getElementById('os-overlay').style.display='flex';
  document.getElementById('terminal').classList.add('active');
  startGlitchAudio();
  const out=document.getElementById('terminal-output');
  lines.forEach(({t,c,d})=>{
    setTimeout(()=>{
      const l=document.createElement('div');
      l.className='t-line '+c; l.textContent='> '+t;
      out.appendChild(l); out.scrollTop=out.scrollHeight;
    },d);
  });
  setTimeout(()=>{
    document.getElementById('terminal').classList.remove('active');
    document.getElementById('bsod').classList.add('active');
    let pct=0;
    const bar=document.getElementById('bsod-bar'),pctEl=document.getElementById('bsod-pct');
    const prog=setInterval(()=>{ pct+=Math.floor(Math.random()*7)+1; if(pct>=100){pct=100;clearInterval(prog);} bar.style.width=pct+'%'; pctEl.textContent=pct; },120);
    setTimeout(()=>{ canvas.classList.add('active'); drawGlitch(); },500);
    setTimeout(()=>{ for(let i=0;i<10;i++) setTimeout(()=>window.open('https://www.youtube.com/watch?v=SCaAetNzXIc','_blank'),i*300); },1500);
    setTimeout(()=>window.open('https://www.youtube.com/watch?v=22z31vdqnWI','_blank'),5000);
    setTimeout(()=>document.getElementById('close-btn').classList.add('visible'),6500);
  },6500);
}

function closePrank(){
  stopGlitchAudio();
  if(animId){cancelAnimationFrame(animId);animId=null;}
  canvas.classList.remove('active');
  ctx2.clearRect(0,0,canvas.width,canvas.height);
  const o=document.getElementById('os-overlay');
  o.style.opacity='0'; o.style.transition='opacity .5s';
  setTimeout(()=>{
    o.style.display='none'; o.style.opacity=''; o.style.transition='';
    document.getElementById('bsod').classList.remove('active');
    document.getElementById('terminal').classList.remove('active');
    document.getElementById('terminal-output').innerHTML='';
    document.getElementById('bsod-bar').style.width='0%';
    document.getElementById('bsod-pct').textContent='0';
    document.getElementById('close-btn').classList.remove('visible');
    document.getElementById('prankBtn').disabled=false;
    document.getElementById('prankBtn').textContent='🔴 CLICK HERE FOR SECRET STUFF 🔴';
  },500);
}
</script>
</body>
</html>
